name: CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/gates/**'
      - 'NEXUS_CONTEXT/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'vitest.config.ts'
      - 'eslint.config.js'
      - '.github/pull_request_template.md'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
      - agent/codex
    paths:
      - 'src/**'
      - 'scripts/gates/**'
      - 'NEXUS_CONTEXT/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'vitest.config.ts'
      - 'eslint.config.js'
      - '.github/pull_request_template.md'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-app:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Sacred Flow Gate
        run: node scripts/gates/sacred-flow-gate.cjs

      - name: Report Presence Gate
        env:
          GATE_EVENT_NAME: ${{ github.event_name }}
          GATE_BASE_REF: ${{ github.base_ref || 'main' }}
        run: node scripts/gates/report-presence-gate.cjs

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm run test --if-present

      - name: Build
        run: npm run build
