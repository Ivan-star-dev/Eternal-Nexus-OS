name: Deploy Readiness Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  deploy-readiness:
    name: Deploy Readiness Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Deploy Readiness Gate
        run: node scripts/gates/deploy-readiness-gate.cjs
